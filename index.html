<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b0f;
      --surface: #13131a;
      --ring-bg: #1c1c28;
      --border: #252535;
      --accent: #c8f542;
      --accent2: #42f5c8;
      --text: #f0f0f0;
      --muted: #555570;
      --danger: #ff4d6a;
      --font-display: 'Unbounded', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    :root.light {
      --bg: #f2f0e8;
      --surface: #e4e1d6;
      --ring-bg: #d4d0c4;
      --border: #c0bcac;
      --accent: #4a6800;
      --accent2: #006b4a;
      --text: #1a1a10;
      --muted: #888870;
      --danger: #b80025;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background .35s, color .35s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 110%, rgba(200,245,66,.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 10%, rgba(66,245,200,.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
      opacity: .4;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 32px 20px;
      width: 100%;
      max-width: 480px;
    }

    .top-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(10px, 2.5vw, 13px);
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* theme toggle */
    .theme-toggle {
      position: relative;
      width: 48px;
      height: 26px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      transition: background .3s, border-color .3s;
      flex-shrink: 0;
    }

    .toggle-knob {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform .3s cubic-bezier(.34,1.4,.64,1), background .3s;
      pointer-events: none;
    }

    :root.light .toggle-knob {
      transform: translateX(22px);
      background: var(--accent);
    }

    .toggle-emoji {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      pointer-events: none;
    }
    .toggle-emoji.moon { left: 5px; }
    .toggle-emoji.sun  { right: 4px; }

    /* ring */
    .ring-wrap {
      position: relative;
      width: clamp(220px, 60vw, 300px);
      height: clamp(220px, 60vw, 300px);
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: var(--ring-bg);
      stroke-width: 8;
      transition: stroke .35s;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s linear, stroke 0.3s;
    }

    @keyframes tick-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .5; }
    }
    .ring-progress.running { animation: tick-pulse 1s ease-in-out infinite; }
    .ring-progress.warning { stroke: var(--danger); }

    .time-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .time-digits {
      font-family: var(--font-display);
      font-weight: 200;
      font-size: clamp(36px, 10vw, 58px);
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
      transition: color .3s;
    }
    .time-digits.warning { color: var(--danger); }

    .time-label {
      font-size: 10px;
      letter-spacing: .2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* presets */
    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: .05em;
      padding: 6px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: border-color .2s, color .2s, background .2s;
    }
    .preset-btn:hover,
    .preset-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(100,120,0,.06);
    }

    /* custom input */
    .custom-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .custom-row label {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--muted);
    }
    .time-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      width: 52px;
      padding: 5px 8px;
      border-radius: 6px;
      text-align: center;
      outline: none;
      transition: border-color .2s, background .35s, color .35s;
    }
    .time-input:focus { border-color: var(--accent); }
    .time-sep { color: var(--muted); font-size: 14px; }

    /* controls */
    .controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 100px;
      font-family: var(--font-display);
      font-weight: 400;
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: transform .15s, opacity .2s, background .2s, color .2s;
    }
    .btn:active { transform: scale(.94); }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      font-size: clamp(11px, 2.5vw, 13px);
      padding: 14px 40px;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-primary.paused { background: var(--accent2); }

    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 12px 22px;
      transition: border-color .2s, color .2s, background .35s;
    }
    .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

    @keyframes done-flash {
      0%, 100% { background: var(--bg); }
      50%       { background: rgba(255,77,106,.08); }
    }
    body.done { animation: done-flash .6s ease-in-out 4; }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="top-bar">
    <div class="brand">Focus Timer</div>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">
      <span class="toggle-emoji moon">🌙</span>
      <span class="toggle-emoji sun">☀️</span>
      <div class="toggle-knob"></div>
    </button>
  </div>

  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 120 120">
      <circle class="ring-track"    cx="60" cy="60" r="52"/>
      <circle class="ring-progress" cx="60" cy="60" r="52" id="ring"/>
    </svg>
    <div class="time-display">
      <div class="time-digits" id="display">25:00</div>
      <div class="time-label"  id="state-label">ready</div>
    </div>
  </div>

  <div class="presets">
    <button class="preset-btn active" data-mins="25">25 min</button>
    <button class="preset-btn" data-mins="15">15 min</button>
    <button class="preset-btn" data-mins="10">10 min</button>
    <button class="preset-btn" data-mins="5">5 min</button>
    <button class="preset-btn" data-mins="1">1 min</button>
  </div>

  <div class="custom-row">
    <label>custom</label>
    <input class="time-input" id="custom-m" type="number" min="0" max="99" value="0" placeholder="mm"/>
    <span class="time-sep">:</span>
    <input class="time-input" id="custom-s" type="number" min="0" max="59" value="0" placeholder="ss"/>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" id="reset-btn">Reset</button>
    <button class="btn btn-primary"   id="start-btn">Start</button>
  </div>

</div>

<script>
  // theme
  var root = document.documentElement;
  if (localStorage.getItem('timer-theme') === 'light') root.classList.add('light');
  document.getElementById('theme-toggle').addEventListener('click', function() {
    root.classList.toggle('light');
    localStorage.setItem('timer-theme', root.classList.contains('light') ? 'light' : 'dark');
  });

  // timer
  var ring       = document.getElementById('ring');
  var display    = document.getElementById('display');
  var stateLabel = document.getElementById('state-label');
  var startBtn   = document.getElementById('start-btn');
  var resetBtn   = document.getElementById('reset-btn');
  var presetBtns = document.querySelectorAll('.preset-btn');
  var customM    = document.getElementById('custom-m');
  var customS    = document.getElementById('custom-s');

  var R    = 52;
  var CIRC = 2 * Math.PI * R;
  ring.style.strokeDasharray  = CIRC;
  ring.style.strokeDashoffset = 0;

  var totalSeconds = 25 * 60;
  var remaining    = totalSeconds;
  var intervalId   = null;
  var running      = false;

  function fmt(s) {
    return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
  }

  function updateDisplay() {
    display.textContent = fmt(remaining);
    var frac = totalSeconds > 0 ? remaining / totalSeconds : 0;
    ring.style.strokeDashoffset = CIRC * (1 - frac);
    var warn = remaining <= 60 && remaining > 0 && running;
    ring.classList.toggle('warning', warn);
    display.classList.toggle('warning', warn);
  }

  function stopTimer() {
    clearInterval(intervalId);
    intervalId = null;
    running = false;
  }

  function setTimer(secs) {
    stopTimer();
    totalSeconds = secs;
    remaining    = secs;
    updateDisplay();
    stateLabel.textContent = 'ready';
    startBtn.textContent   = 'Start';
    startBtn.classList.remove('paused');
    ring.classList.remove('running', 'warning');
    display.classList.remove('warning');
    document.body.classList.remove('done');
  }

  function tick() {
    if (remaining <= 0) {
      stopTimer();
      updateDisplay();
      stateLabel.textContent = 'done!';
      startBtn.textContent   = 'Start';
      startBtn.classList.remove('paused');
      ring.classList.remove('running');
      document.body.classList.add('done');
      document.body.addEventListener('animationend', function() {
        document.body.classList.remove('done');
      }, { once: true });
      return;
    }
    remaining--;
    updateDisplay();
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    stateLabel.textContent = m + 'm ' + String(s).padStart(2,'0') + 's left';
  }

  function startTimer() {
    if (remaining <= 0) return;
    running    = true;
    intervalId = setInterval(tick, 1000);
    startBtn.textContent = 'Pause';
    startBtn.classList.add('paused');
    ring.classList.add('running');
    stateLabel.textContent = 'running';
    document.body.classList.remove('done');
  }

  function pauseTimer() {
    stopTimer();
    startBtn.textContent = 'Resume';
    startBtn.classList.remove('paused');
    ring.classList.remove('running');
    if (remaining > 0 && remaining < totalSeconds) stateLabel.textContent = 'paused';
  }

  startBtn.addEventListener('click', function() {
    if (running) pauseTimer(); else startTimer();
  });

  resetBtn.addEventListener('click', function() {
    setTimer(totalSeconds);
  });

  presetBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      presetBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      customM.value = 0;
      customS.value = 0;
      setTimer(Number(btn.dataset.mins) * 60);
    });
  });

  function applyCustom() {
    var m = Math.max(0, Math.min(99, parseInt(customM.value) || 0));
    var s = Math.max(0, Math.min(59, parseInt(customS.value) || 0));
    var total = m * 60 + s;
    if (total > 0) {
      presetBtns.forEach(function(b) { b.classList.remove('active'); });
      setTimer(total);
    }
  }

  customM.addEventListener('change', applyCustom);
  customS.addEventListener('change', applyCustom);

  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
      e.preventDefault();
      startBtn.click();
    }
  });

  updateDisplay();
</script>
</body>
</html>
